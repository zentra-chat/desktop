name: Sync Web Submodule

on:
  push:
    branches: [main, develop]
  repository_dispatch:
    types: [web-updated]
  workflow_dispatch:
    inputs:
      web_ref:
        type: string
        description: 'Web branch to sync (main or develop)'
        required: false
        default: 'main'

permissions:
  contents: write

concurrency:
  group: sync-web
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout desktop repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update web submodule to match branch
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            branch="${{ github.event.client_payload.web_ref }}"
          elif [[ -n "${{ inputs.web_ref }}" ]]; then
            branch="${{ inputs.web_ref }}"
          else
            branch="${GITHUB_REF#refs/heads/}"
          fi

          echo "target_branch=$branch" >> "$GITHUB_OUTPUT"

          git submodule sync --recursive
          git submodule update --init --recursive frontend

          git -C frontend fetch origin "$branch"
          current_sha="$(git -C frontend rev-parse HEAD)"
          latest_sha="$(git -C frontend rev-parse "origin/$branch")"

          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "latest_sha=$latest_sha" >> "$GITHUB_OUTPUT"

          if [[ "$current_sha" == "$latest_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C frontend checkout --detach "$latest_sha"
          git add frontend
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push submodule update
        if: steps.sync.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          branch="${{ steps.sync.outputs.target_branch }}"
          sha="${{ steps.sync.outputs.latest_sha }}"
          short_sha="${sha:0:12}"

          git commit -m "chore: sync web submodule to ${short_sha} ($branch)"
          git push