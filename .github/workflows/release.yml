name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Create symlinks
        run: |
          ln -sf frontend/src src
          ln -sf frontend/static static

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get version from tag
        shell: bash
        run: |
          raw_version="${GITHUB_REF#refs/tags/v}"  # 2026.04.24.0150

          is_dev="false"
          if [[ "$raw_version" == *-dev ]]; then
            is_dev="true"
            raw_version="${raw_version%-dev}"
          fi

          y="${raw_version%%.*}"           # 2026
          rest="${raw_version#*.}"         # 04.24.0150
          m=$((10#${rest%%.*}))            # 4  (strips leading zero)
          rest2="${rest#*.}"               # 24.0150
          d="${rest2%%.*}"                 # 24
          build="${rest2#*.}"              # 0150

          normal="${y}.${m}.${d}+${build}" # 2026.4.24+0150

          if [[ "$is_dev" == "true" ]]; then
            normal="${normal}-dev"
          fi

          msi_y=$((y > 255 ? y % 100 : y))
          msi_m=$((m > 255 ? 255 : m))
          msi_d=$((d > 255 ? 255 : d))
          msi_build=$((build > 65535 ? 65535 : build))
          msi="${msi_y}.${msi_m}.${msi_d}+${msi_build}"

          echo "VERSION=$normal" >> $GITHUB_ENV
          echo "SEMVER=$normal" >> $GITHUB_ENV
          echo "MSI_VERSION=$msi" >> $GITHUB_ENV

      - name: Update version in tauri.conf.json (Windows uses MSI-safe version)
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            echo "Using MSI-safe version for Windows: $MSI_VERSION"
            jq ".version = \"$MSI_VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          else
            echo "Using normal version: $SEMVER"
            jq ".version = \"$SEMVER\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          fi
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_DEFAULT_INSTANCE_URL: ${{ vars.PUBLIC_DEFAULT_INSTANCE_URL }}
          PUBLIC_DEFAULT_INSTANCE_NAME: ${{ vars.PUBLIC_DEFAULT_INSTANCE_NAME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zentra Desktop ${{ env.VERSION }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: ${{ contains(env.VERSION, '-dev') && 'true' || 'false' }}
          args: ${{ matrix.args }}