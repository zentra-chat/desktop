name: Release Desktop App

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version and tag
        id: version
        run: |
          set -euo pipefail

          branch="${GITHUB_REF#refs/heads/}"
          is_dev="false"
          if [[ "$branch" == "develop" ]]; then
            is_dev="true"
          fi

          timestamp="$(git log -1 --format='%ct' HEAD)"
          version_date="$(date -u -d "@$timestamp" '+%Y.%m.%d.%H%M')"

          if [[ "$is_dev" == "true" ]]; then
            version="${version_date}-dev"
          else
            version="$version_date"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          tag="v$version"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 0
          fi
          git tag -a "$tag" -m "Release $version"
          git push origin "$tag"

  release:
    if: "!startsWith(github.ref, 'refs/heads/')"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch all tags
        run: git fetch --tags origin

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Create symlinks
        run: |
          ln -sf frontend/src src
          ln -sf frontend/static static

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get version from tag
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Update version in tauri.conf.json
        run: |
          jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_DEFAULT_INSTANCE_URL: ${{ vars.PUBLIC_DEFAULT_INSTANCE_URL }}
          PUBLIC_DEFAULT_INSTANCE_NAME: ${{ vars.PUBLIC_DEFAULT_INSTANCE_NAME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zentra Desktop ${{ env.VERSION }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: ${{ contains(env.VERSION, '-dev') && 'true' || 'false' }}
          args: ${{ matrix.args }}