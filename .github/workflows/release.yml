name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Create symlinks
        run: |
          ln -sf frontend/src src
          ln -sf frontend/static static

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

- name: Get version from tag
        run: |
          raw_version="${GITHUB_REF#refs/tags/v}"
          is_dev="false"
          if [[ "$raw_version" == *-dev ]]; then
            is_dev="true"
            raw_version="${raw_version%-dev}"
          fi
          
          # Format: YYYY.MM.DD.HHMM -> YYYY.MM.DHHMM (3 parts)
          y="${raw_version%%.*}"  # YYYY
          rest="${raw_version#*.}"  # MM.DD.HHMM  
          m="${rest%%.*}"         # MM
          pd="${rest#*.}"        # DD.HHMM
          pd="${pd//./}"        # DDHOMM (remove all dots)
          
          # Semver: major.minor.patch
          if [[ "$is_dev" == "true" ]]; then
            semver="${y}.${m}.${pd}-dev"
          else
            semver="${y}.${m}.${pd}"
          fi
          
          echo "VERSION=$raw_version" >> $GITHUB_ENV
          echo "SEMVER=$semver" >> $GITHUB_ENV

      - name: Update version in tauri.conf.json
        run: |
          jq ".version = \"$SEMVER\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_DEFAULT_INSTANCE_URL: ${{ vars.PUBLIC_DEFAULT_INSTANCE_URL }}
          PUBLIC_DEFAULT_INSTANCE_NAME: ${{ vars.PUBLIC_DEFAULT_INSTANCE_NAME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zentra Desktop ${{ env.VERSION }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: ${{ contains(env.VERSION, '-dev') && 'true' || 'false' }}
          args: ${{ matrix.args }}